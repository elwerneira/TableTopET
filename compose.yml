version: "3.8"
services:
  angular-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: TableTopET-container
    ports:
    - "8080:80"
    depends_on:
    - json-server-api

  json-server-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: TableTopET-json-server-container
    ports:
    - "3000:3000"
    volumes:
    - ./db.json:/app/db.json